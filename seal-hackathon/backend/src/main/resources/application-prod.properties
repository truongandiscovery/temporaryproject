# === KẾT NỐI DATABASE AZURE SQL ONLINE ===
# Đảm bảo dùng dấu hai chấm :1433 để cố định cổng kết nối của Azure
spring.datasource.url=jdbc:sqlserver://${DB_HOST}:1433;databaseName=${DB_NAME};encrypt=true;trustServerCertificate=false;loginTimeout=30;
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# === Cấu hình cố định cho Đám mây ===
# Trên môi trường chạy thật, tuyệt đối để 'none' để tránh việc Hibernate tự động làm xáo trộn cấu hình dữ liệu chuẩn của Azure
spring.jpa.hibernate.ddl-auto=none
