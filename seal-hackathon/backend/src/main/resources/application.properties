# Defaults to dev locally; override with SPRING_PROFILES_ACTIVE in deployed environments.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# (Khi nao muon may local ket noi thang len Azure SQL truc tuyen de kiem tra du lieu, ban chi can sua chu 'dev' thanh 'prod')
