spring.application.name=seal-hackathon-backend
server.port=8080
spring.config.import=optional:file:./local-mail.properties

# === Cau hinh Bao mat chung ===
app.jwt.secret=${JWT_SECRET:VGhpc0lzQVN0cm9uZzI1NkJpdEJhc2U2NFNlY3JldEtleUZvclN3cDM5MQ==}
app.jwt.expiration-seconds=3600
app.auth.auto-approve-new-user=false
app.google.client-id=495164159780-2gnoclb1ov4gjkus9sjbk5s0isc0cpa3.apps.googleusercontent.com
app.auth.password-reset.otp-expiry-minutes=10
app.mail.from=${MAIL_FROM:${spring.mail.username:}}
app.storage.avatar-dir=./uploads/avatars
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# === Cau hinh JPA / Hibernate chung ===
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
